<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#0a0a0a;min-height:100vh;overflow-x:hidden;}

.page{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}

.collage{position:fixed;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:3px;z-index:0;}
.slot{overflow:hidden;background:#111;}
.slot img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(0.75) brightness(0.85);}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.62);z-index:1;}

/* card wrapper — our branding stays, Klaviyo form renders inside */
.card{
  position:relative;z-index:2;
  background:rgba(15,15,15,0.92);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:4px;
  padding:2.2rem 2rem 1.8rem;
  width:100%;max-width:480px;
  box-shadow:0 8px 60px rgba(0,0,0,0.7);
}

.logo-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.2rem;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.55);}
.gold-dot{width:5px;height:5px;border-radius:50%;background:#c9a84c;}

.hero-title{font-family:'Bebas Neue',sans-serif;font-size:58px;line-height:1;text-align:center;color:#fff;letter-spacing:2px;}
.hero-title span{color:#c9a84c;}
.hero-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);text-align:center;margin-top:0.5rem;}
.form-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#c9a84c;text-align:center;margin:1.4rem 0 0.8rem;}

/* Override Klaviyo form styles to match our dark theme */
.klaviyo-form-WyjJbQ {
  background: transparent !important;
}
[class*="klaviyo-form"] * {
  font-family: 'Barlow', sans-serif !important;
}
[class*="klaviyo-form"] input {
  background: rgba(255,255,255,0.07) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  color: #fff !important;
  border-radius: 2px !important;
}
[class*="klaviyo-form"] input::placeholder {
  color: rgba(255,255,255,0.35) !important;
}
[class*="klaviyo-form"] input:focus {
  border-color: #c9a84c !important;
  outline: none !important;
}
[class*="klaviyo-form"] button[type="submit"],
[class*="klaviyo-form"] .go2392314017 {
  background: linear-gradient(90deg,#b8922e,#e8c96a) !important;
  color: #0a0a0a !important;
  font-family: 'Bebas Neue', sans-serif !important;
  letter-spacing: 4px !important;
  font-size: 17px !important;
  border-radius: 2px !important;
  border: none !important;
}
[class*="klaviyo-form"] label {
  color: rgba(255,255,255,0.6) !important;
}
[class*="klaviyo-form"] p {
  color: rgba(255,255,255,0.35) !important;
  font-size: 10px !important;
}
[class*="klaviyo-form"] h1,
[class*="klaviyo-form"] h2,
[class*="klaviyo-form"] h3 {
  display: none !important;
}

@media(max-width:520px){
  .card{padding:1.8rem 1.2rem;}
  .hero-title{font-size:46px;}
  .collage{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(4,1fr);}
}
